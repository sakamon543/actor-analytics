name: 3day-cycle

on:
  schedule:
    # UTC 月木日 00:00 = JST 月木日 09:00（≒3日サイクル）
    - cron: '0 0 * * 1,4,0'
  workflow_dispatch:  # 手動実行可（GitHub Actions タブから）

permissions:
  contents: write  # git push に必要

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run 3day cycle
        env:
          HAKUOO_TOKEN: ${{ secrets.HAKUOO_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python note_tools/run_3day_cycle.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "cycle: $(date -u +%Y-%m-%dT%H:%MZ) auto-fetch and analyze"
            git push
          fi
